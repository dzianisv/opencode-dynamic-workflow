name: release

on:
  push:
    branches: [main]

# Serialize releases; never cancel an in-flight publish.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # tags, GitHub release, changelog/version commit back to main
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org" # writes ~/.npmrc using NODE_AUTH_TOKEN
      - run: bun install --frozen-lockfile
      - name: Gates
        run: |
          bun test
          bun run typecheck
          bun run lint
      - name: Release (semantic-release → build → npm publish all plugins)
        run: npx --no-install semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
